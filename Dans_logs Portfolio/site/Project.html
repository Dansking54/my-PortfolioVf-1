<!DOCTYPE html>
<html lang="en" data-screen-label="Project">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project — Dan's Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<script src="../lib/image-slot.js"></script>
<script src="projects.js"></script>
<style>
  /* Project hero */
  .phero{position:relative;height:78vh;min-height:540px;overflow:hidden}
  .phero img{width:100%;height:100%;object-fit:cover}
  .phero::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,.42),rgba(0,0,0,0) 30%,rgba(0,0,0,0) 50%,rgba(0,0,0,.74))}
  .phero-copy{position:absolute;left:0;right:0;bottom:46px;z-index:2;color:#f7f2e8}
  .back{display:inline-flex;align-items:center;gap:8px;margin-bottom:26px;font-size:12px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--sand);font-weight:600}
  .back:hover{color:#fff}
  .phero-marker{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .phero-marker .pn{font-family:'Anton',sans-serif;font-size:20px;color:var(--sand)}
  .phero-marker h1{font-family:'Anton',sans-serif;text-transform:uppercase;
    font-size:clamp(48px,9vw,128px);line-height:.9;letter-spacing:.01em}
  .phero-sub{display:flex;justify-content:space-between;gap:34px;align-items:flex-end;margin-top:18px;flex-wrap:wrap}
  .phero-sub .pc{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--sand);white-space:nowrap}
  .phero-sub p{max-width:540px;font-size:16px;line-height:1.55;color:rgba(247,242,232,.9);text-wrap:pretty}

  /* Gallery */
  .gallery{padding:84px 0 36px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;grid-auto-flow:dense}
  .g-item{position:relative;overflow:hidden;background:var(--paper2);aspect-ratio:4/5;margin:0}
  .g-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s cubic-bezier(.2,.7,.2,1)}
  .g-item:hover img{transform:scale(1.045)}
  .g-item.wide{grid-column:span 2;aspect-ratio:16/10}
  .g-item image-slot{width:100%;height:100%}
  .g-item.vid a{display:block;position:relative;width:100%;height:100%}
  .g-item.vid::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.28);transition:.3s}
  .g-item.vid:hover::after{background:rgba(0,0,0,.16)}
  .g-item.vid .play{position:absolute;inset:0;margin:auto;width:74px;height:74px;border-radius:50%;z-index:2;
    background:rgba(212,180,131,.94);color:#0b0a08;display:flex;align-items:center;justify-content:center;
    font-size:24px;padding-left:5px;transition:transform .3s}
  .g-item.vid:hover .play{transform:scale(1.08)}
  .g-item.vid .vlbl{position:absolute;left:18px;bottom:16px;z-index:2;color:#f7f2e8;font-family:'Anton',sans-serif;
    text-transform:uppercase;font-size:18px;letter-spacing:.04em}

  /* Prev / next */
  .pnav{display:flex;justify-content:space-between;gap:20px;padding:34px 0 96px;
    border-top:1px solid var(--line);margin-top:44px}
  .pnav a{display:flex;flex-direction:column;gap:7px;max-width:48%}
  .pnav a.next{text-align:right;margin-left:auto;align-items:flex-end}
  .pnav .lbl{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .pnav .nm{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(22px,3.4vw,30px);letter-spacing:.01em}
  .pnav a:hover .nm{color:var(--accent)}

  @media(max-width:820px){.gallery{grid-template-columns:1fr 1fr;gap:14px}.g-item.wide{grid-column:span 2}}
  @media(max-width:520px){.gallery{grid-template-columns:1fr}.g-item.wide{grid-column:span 1;aspect-ratio:4/5}
    .phero{height:70vh}}
</style>
</head>
<body>
<header class="site on-photo" id="hdr">
  <a class="logo" href="Home.html">Dan<b>.</b></a>
  <nav>
    <a href="Home.html">Home</a>
    <a href="Photography.html">Photography</a>
    <a href="Film.html">Film</a>
    <a href="About.html">About</a>
    <a href="Services.html">Services</a>
    <a href="Contact.html">Contact</a>
    <a class="ig" href="https://www.instagram.com/dans_logs/" target="_blank" rel="noopener">@dans_logs ↗</a>
  </nav>
</header>

<div class="phero">
  <img id="pheroImg" src="../assets/hero-goldenhour.jpg" alt="" />
  <div class="phero-copy wrap">
    <a class="back" href="Home.html#work">← All work</a>
    <div class="phero-marker">
      <span class="pn" id="pNum">01</span>
      <h1 id="pTitle">Project</h1>
    </div>
    <div class="phero-sub">
      <span class="pc" id="pCat">Street · 2025 · Montréal</span>
      <p id="pBlurb"></p>
    </div>
  </div>
</div>

<section class="gallery wrap" id="gallery"></section>
<nav class="pnav wrap" id="pnav"></nav>

<a class="cta-band" href="Contact.html">
  <span class="eyebrow">Like this set?</span>
  <span class="big display">Let's <em>Roll</em></span>
  <span class="sub" style="display:block">Book a shoot or a film — <b>danslogs.contact@gmail.com</b></span>
</a>

<footer class="site">
  <a class="logo" href="Home.html">Dan<b>.</b></a>
  <div class="pages">
    <a href="Photography.html">Photography</a><a href="Film.html">Film</a><a href="About.html">About</a><a href="Services.html">Services</a><a href="Contact.html">Contact</a>

  <a class="ig" href="https://www.instagram.com/dans_logs/" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle></svg>
    @dans_logs

</html>
